name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ard
          POSTGRES_PASSWORD: ard
          POSTGRES_DB: ard_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U ard -d ard_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Check formatting
        run: make fmt-check

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Integration tests
        env:
          ARD_TEST_DATABASE_URL: postgres://ard:ard@127.0.0.1:55432/ard_test?sslmode=disable
        run: make test-integration
