name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Verify release tag
        run: |
          case "$GITHUB_REF_NAME" in
            v*) ;;
            *) echo "release workflow only accepts v* tags"; exit 1 ;;
          esac

      - name: Package release artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: make package

      - name: Verify release checksums
        run: |
          cd dist
          shasum -a 256 -c checksums.txt

      - name: Prepare SBOM attestation subjects
        run: grep '\.tar\.gz$' dist/checksums.txt > "$RUNNER_TEMP/release-archives.checksums.txt"

      - name: Attest release artifact provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-checksums: dist/checksums.txt

      - name: Attest release archive SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-checksums: ${{ runner.temp }}/release-archives.checksums.txt
          sbom-path: dist/sbom.spdx.json

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
